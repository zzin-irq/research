name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run

  backend:
    name: Backend lint, typecheck, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: research
          POSTGRES_PASSWORD: research
          POSTGRES_DB: research_irq
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://research:research@localhost:5432/research_irq
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_PRIVATE_KEY: dev-key-not-real-but-long-enough-to-pass-zod-validation-xxx
      JWT_PUBLIC_KEY: dev-key-not-real-but-long-enough-to-pass-zod-validation-xxx
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: noreply@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Audit frontend
        run: cd frontend && npm audit --omit=dev --audit-level=high || true
      - name: Audit backend
        run: cd backend && npm audit --omit=dev --audit-level=high || true
